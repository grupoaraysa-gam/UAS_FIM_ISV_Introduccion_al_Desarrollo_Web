<!DOCTYPE html>
<html>
<body>

    <!-- Establecemos el color de fondo del <h1> a DodgerBlue -->
    <h1 style="background-color: DodgerBlue;">
        Bienvenido a mi página
    </h1>

    <!-- Establecemos el color del texto del primer párrafo a Tomato -->
    <p style="color: Tomato;">
        Este es el primer párrafo con texto en color Tomato.
    </p>

    <!-- Establecemos el color del borde del segundo párrafo a MediumSeaGreen -->
    <!-- Usamos la propiedad: border: 2px solid MediumSeaGreen -->
    <p style="border: 2px solid MediumSeaGreen;">
        Este es el segundo párrafo con borde color MediumSeaGreen.
    </p>

</body>
</html>
