<!DOCTYPE html>
<html>
<body>

    <!-- Envolvemos la palabra "importante" en <strong> para indicar importancia -->
    <p>Este es un mensaje <strong>importante</strong>.</p>

    <!-- Envolvemos la palabra "cuidadosamente" en <em> para dar énfasis -->
    <p>Por favor lee las instrucciones <em>cuidadosamente</em>.</p>

    <!-- Envolvemos la palabra "leche" en <mark> para resaltarla -->
    <p>No olvides comprar <mark>leche</mark> en la tienda.</p>

    <!-- Envolvemos el número 2 en H2O con <sub> para que sea subíndice -->
    <p>La fórmula química del agua es H<sub>2</sub>O.</p>

    <!-- Envolvemos la palabra "azul" en <del> para indicar texto eliminado -->
    <p>Mi color favorito es <del>azul</del>.</p>

</body>
</html>
