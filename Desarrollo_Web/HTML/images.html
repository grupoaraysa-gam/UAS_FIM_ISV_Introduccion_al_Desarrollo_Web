<!DOCTYPE html>
<html>
<body>

    <h1>Mi Imagen</h1>

    <!-- Agregamos un elemento <img> después del encabezado -->
    <!-- src indica la ruta de la imagen -->
    <!-- alt describe la imagen (importante para accesibilidad) -->
    <!-- width define el ancho en píxeles -->
    <!-- height define la altura en píxeles -->
    <img src="pic_trulli.jpg"
         alt="Italian Trulli"
         width="500"
         height="333">

</body>
</html>
