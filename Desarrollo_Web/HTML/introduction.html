<!-- AQUI ABREMOS UNA ETIQUETA: CON !DOCTYPE html, head y body -->
<!DOCTYPE html>
<html>
<head>
<title>ARAYSA</title>
</head>
<body>

<h1>Tienda Online</h1>
<p>Bienvenido al Mundo del Software.</p>

</body>
</html> 

<!--EXPLICACION -->
<!-- La declaración <!DOCTYPE html> define que este documento es un documento HTML5 -->

<!-- El elemento <html> es el elemento raíz de una página HTML -->

<!-- El elemento <head> contiene información meta sobre la página HTML -->

<!-- El elemento <title> especifica un título para la página HTML 
     (el cual se muestra en la barra de título del navegador o en la pestaña de la página) -->

<!-- El elemento <body> define el cuerpo del documento y es un contenedor 
     para todo el contenido visible, como encabezados, párrafos, imágenes, 
     hipervínculos, tablas, listas, etc. -->

<!-- El elemento <h1> define un encabezado grande -->

<!-- El elemento <p> define un párrafo -->
