<!DOCTYPE html>
<html>
<body>

    <!-- Creamos un enlace con el texto "Visita W3Schools" -->
    <!-- href define la URL de destino -->
    <!-- target="_blank" hace que el enlace se abra en una nueva pestaña -->
    <!-- title muestra un texto cuando el usuario pasa el cursor sobre el enlace -->
    <a href="https://www.w3schools.com" 
       target="_blank" 
       title="Go to W3Schools">
        Visita W3Schools
    </a>

</body>
</html>
