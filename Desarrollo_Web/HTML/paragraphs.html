<!DOCTYPE html>
<html>
<body>

    <!-- Envolvemos las primeras dos líneas dentro de un elemento <p> -->
    <!-- Agregamos un <br> después de la palabra "star," para hacer un salto de línea -->
    <p>
        Twinkle, twinkle, little star,<br>
        How I wonder what you are!
    </p>

    <!-- Agregamos una línea horizontal para separar las secciones -->
    <hr>

    <!-- Envolvemos las últimas dos líneas dentro de un elemento <pre> -->
    <!-- El elemento <pre> conserva los espacios y saltos de línea tal como se escriben -->
    <pre>
Up above the world so high,
Like a diamond in the sky.
    </pre>

</body>
</html>
