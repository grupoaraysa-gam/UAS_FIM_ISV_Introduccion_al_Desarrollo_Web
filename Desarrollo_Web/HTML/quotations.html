<!DOCTYPE html>
<html>
<body>

    <!-- Envolvemos el texto de la cita en un elemento <blockquote> -->
    <!-- Agregamos el atributo cite con la URL indicada -->
    <blockquote cite="https://www.w3schools.com">
        El aprendizaje constante es clave para mejorar en el desarrollo web.
    </blockquote>

    <!-- Envolvemos la abreviatura HTML en un elemento <abbr> -->
    <!-- Agregamos el atributo title con su significado completo -->
    <p>
        <abbr title="Hyper Text Markup Language">HTML</abbr> es el lenguaje estándar para crear páginas web.
    </p>

</body>
</html>
