<!DOCTYPE html>
<html>

<!-- Establecemos el color de fondo del <body> a powderblue -->
<body style="background-color: powderblue;">

    <!-- Establecemos el color del texto a azul 
         y la fuente a Verdana en el <h1> -->
    <h1 style="color: blue; font-family: verdana;">
        Bienvenido a mi pagina
    </h1>

    <!-- Centramos el texto del <p> 
         y establecemos el tamaño de fuente a 20px -->
    <p style="text-align: center; font-size: 20px;">
        Este es un parrafo.
    </p>

</body>
</html>
